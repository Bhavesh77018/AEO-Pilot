<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle with subtle glow -->
  <circle cx="100" cy="100" r="95" fill="url(#mainGradient)" opacity="0.08" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#mainGradient)" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Main design: Atomic nucleus with orbital rings -->
  <g transform="translate(100, 100)">
    <!-- Outer protective ring -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="url(#mainGradient)" stroke-width="2.5" opacity="0.6"/>
    
    <!-- Three orbital rings at different angles -->
    <!-- Ring 1 - horizontal -->
    <ellipse cx="0" cy="0" rx="40" ry="32" fill="none" stroke="url(#mainGradient)" stroke-width="2" opacity="0.7"/>
    
    <!-- Ring 2 - rotated 60 degrees -->
    <ellipse cx="0" cy="0" rx="38" ry="30" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.6" transform="rotate(60)"/>
    
    <!-- Ring 3 - rotated -60 degrees -->
    <ellipse cx="0" cy="0" rx="38" ry="30" fill="none" stroke="url(#mainGradient)" stroke-width="2" opacity="0.5" transform="rotate(-60)"/>
    
    <!-- Central nucleus - solid circle with glow -->
    <circle cx="0" cy="0" r="10" fill="url(#mainGradient)" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="10" fill="url(#mainGradient)" opacity="0.3" r="15"/>
    
    <!-- Electron dots on orbits -->
    <!-- Electron 1 (right) -->
    <circle cx="42" cy="0" r="3.5" fill="url(#mainGradient)"/>
    <circle cx="42" cy="0" r="5.5" fill="url(#mainGradient)" opacity="0.2"/>
    
    <!-- Electron 2 (top-left) -->
    <circle cx="-21" cy="36" r="3.5" fill="url(#accentGradient)"/>
    <circle cx="-21" cy="36" r="5.5" fill="url(#accentGradient)" opacity="0.2"/>
    
    <!-- Electron 3 (bottom-left) -->
    <circle cx="-21" cy="-36" r="3.5" fill="url(#mainGradient)"/>
    <circle cx="-21" cy="-36" r="5.5" fill="url(#mainGradient)" opacity="0.2"/>
    
    <!-- Accent sparkles for AI shine -->
    <!-- Top sparkle -->
    <g transform="translate(0, -52)">
      <path d="M 0,-8 L 3,-2 L 8,0 L 3,2 L 0,8 L -3,2 L -8,0 L -3,-2 Z" fill="url(#accentGradient)" opacity="0.8"/>
    </g>
    
    <!-- Bottom-right sparkle -->
    <g transform="translate(40, 35)">
      <path d="M 0,-6 L 2,-1.5 L 6,0 L 2,1.5 L 0,6 L -2,1.5 L -6,0 L -2,-1.5 Z" fill="url(#mainGradient)" opacity="0.6"/>
    </g>
  </g>
</svg>