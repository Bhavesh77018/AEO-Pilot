# Render Blueprint for the AEO Pilot backend (FastAPI).
# Deploy: push to GitHub → Render → New → Blueprint → pick this repo.
# Then set the `sync: false` secrets in the Render dashboard.
services:
  - type: web
    name: aeo-pilot-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    # FREE plan — $0. Caveat: the service sleeps after ~15 min idle, so the
    # first request after a nap cold-starts (~50s). Fine for launch; bump to
    # "starter" ($7/mo) later to remove the cold start.
    plan: free
    healthCheckPath: /health
    # Plain start command — Render injects $PORT and expands it here. The app's
    # lifespan creates any missing tables on boot, and the schema migrations are
    # already applied to Supabase, so no alembic step is needed at startup.
    # (Render does NOT run dockerCommand through a shell, so `&&`/`sh -c` fail —
    # keep this a single exec-style command.)
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      # Supabase Postgres (use the IPv4 session pooler connection string).
      - key: DATABASE_URL
        sync: false
      # Comma-separated allowed origins — set to your Vercel/Netlify URL(s).
      - key: CORS_ORIGINS
        sync: false
      # Supabase token verification → per-user data isolation. Public values
      # (URL + publishable/anon key). REQUIRED for users to see only their own
      # projects. SUPABASE_ANON_KEY = your sb_publishable_... key.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      # LLM (optional but recommended for live monitoring + content).
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: OPENAI_API_KEY
        sync: false
      # Payments (optional — leave unset to keep billing disabled).
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: SECRET_KEY
        generateValue: true
