<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" fill="#0a0e27"/>
  
  <!-- Main icon -->
  <g transform="translate(64, 64)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="url(#faviconGradient)" stroke-width="3"/>
    
    <!-- Orbital rings -->
    <ellipse cx="0" cy="0" rx="35" ry="30" fill="none" stroke="url(#faviconGradient)" stroke-width="2.5" opacity="0.7"/>
    <ellipse cx="0" cy="0" rx="25" ry="32" fill="none" stroke="url(#faviconGradient)" stroke-width="2" opacity="0.5" transform="rotate(45)"/>
    
    <!-- Center nucleus -->
    <circle cx="0" cy="0" r="8" fill="url(#faviconGradient)"/>
    
    <!-- Electron dots -->
    <circle cx="-10" cy="-10" r="4" fill="url(#faviconGradient)" opacity="0.8"/>
    <circle cx="10" cy="0" r="4" fill="url(#faviconGradient)" opacity="0.8"/>
    <circle cx="0" cy="10" r="4" fill="url(#faviconGradient)" opacity="0.8"/>
  </g>
</svg>